<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!-- ===== NAVBAR - Fragmento reutilizable ===== -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-mortarboard-fill me-2"></i>SpringEduManager
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}" th:classappend="${currentPage == 'home'} ? 'active'">
                        <i class="bi bi-house me-1"></i>Inicio
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/estudiantes}"
                       th:classappend="${currentPage == 'estudiantes'} ? 'active'">
                        <i class="bi bi-people me-1"></i>Estudiantes
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/cursos}"
                       th:classappend="${currentPage == 'cursos'} ? 'active'">
                        <i class="bi bi-book me-1"></i>Cursos
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/evaluaciones}"
                       th:classappend="${currentPage == 'evaluaciones'} ? 'active'">
                        <i class="bi bi-clipboard-check me-1"></i>Evaluaciones
                    </a>
                </li>
                <!-- Opciones solo para ADMIN -->
                <li class="nav-item dropdown" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                        <i class="bi bi-shield-lock me-1"></i>Admin
                    </a>
                    <ul class="dropdown-menu">
                        <li>
                            <a class="dropdown-item" th:href="@{/estudiantes/nuevo}">
                                <i class="bi bi-person-plus me-1"></i>Nuevo Estudiante
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item" th:href="@{/cursos/nuevo}">
                                <i class="bi bi-plus-circle me-1"></i>Nuevo Curso
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item" th:href="@{/evaluaciones/nuevo}">
                                <i class="bi bi-pencil-square me-1"></i>Nueva Evaluacion
                            </a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <a class="dropdown-item" th:href="@{/h2-console}" target="_blank">
                                <i class="bi bi-database me-1"></i>Consola H2
                            </a>
                        </li>
                    </ul>
                </li>
            </ul>
            <!-- Usuario autenticado -->
            <ul class="navbar-nav">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle me-1"></i>
                        <span sec:authentication="name">Usuario</span>
                        <span class="badge bg-warning text-dark ms-1"
                              sec:authorize="hasRole('ADMIN')">ADMIN</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <form th:action="@{/logout}" method="post" class="d-inline">
                                <button type="submit" class="dropdown-item text-danger">
                                    <i class="bi bi-box-arrow-right me-1"></i>Cerrar sesion
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ===== ALERTA de mensajes flash ===== -->
<div th:fragment="alertas" class="container mt-3">
    <div th:if="${mensaje}" th:class="'alert alert-' + ${tipoMensaje} + ' alert-dismissible fade show'"
         role="alert">
        <i class="bi bi-check-circle me-2" th:if="${tipoMensaje == 'success'}"></i>
        <i class="bi bi-exclamation-triangle me-2" th:if="${tipoMensaje == 'danger'}"></i>
        <span th:text="${mensaje}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

</body>
</html>
