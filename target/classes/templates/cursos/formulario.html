<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SpringEduManager - Formulario Curso</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}" th:with="currentPage='cursos'"></div>
<div th:replace="~{fragments/navbar :: alertas}"></div>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-7">

            <!-- Breadcrumb -->
            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}">Inicio</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/cursos}">Cursos</a></li>
                    <li class="breadcrumb-item active" th:text="${accion} + ' Curso'"></li>
                </ol>
            </nav>

            <div class="card border-0 shadow-sm">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0">
                        <i class="bi bi-plus-circle me-2"></i>
                        <span th:text="${accion} + ' Curso'"></span>
                    </h5>
                    <small class="opacity-75">Solo usuarios con rol ADMIN pueden gestionar cursos</small>
                </div>

                <div class="card-body p-4">
                    <!-- Formulario - Leccion 2 y 4 -->
                    <form th:action="@{/cursos/guardar}" th:object="${curso}" method="post" novalidate>

                        <input type="hidden" th:field="*{id}">

                        <div class="row g-3">

                            <div class="col-12">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-book me-1"></i>Nombre del curso <span class="text-danger">*</span>
                                </label>
                                <input type="text" th:field="*{nombre}"
                                       th:class="${#fields.hasErrors('nombre')} ? 'form-control is-invalid' : 'form-control'"
                                       placeholder="Ej: Spring Boot Avanzado">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}"
                                     th:errors="*{nombre}"></div>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-text-paragraph me-1"></i>Descripcion <span class="text-danger">*</span>
                                </label>
                                <textarea th:field="*{descripcion}" rows="3"
                                          th:class="${#fields.hasErrors('descripcion')} ? 'form-control is-invalid' : 'form-control'"
                                          placeholder="Descripcion breve del curso..."></textarea>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('descripcion')}"
                                     th:errors="*{descripcion}"></div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-clock me-1"></i>Duracion (horas) <span class="text-danger">*</span>
                                </label>
                                <input type="number" th:field="*{duracionHoras}"
                                       th:class="${#fields.hasErrors('duracionHoras')} ? 'form-control is-invalid' : 'form-control'"
                                       placeholder="Ej: 80" min="1" max="500">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('duracionHoras')}"
                                     th:errors="*{duracionHoras}"></div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-tag me-1"></i>Categoria <span class="text-danger">*</span>
                                </label>
                                <select th:field="*{categoria}"
                                        th:class="${#fields.hasErrors('categoria')} ? 'form-select is-invalid' : 'form-select'">
                                    <option value="">-- Seleccione --</option>
                                    <option value="Backend">Backend</option>
                                    <option value="Frontend">Frontend</option>
                                    <option value="Datos">Datos</option>
                                    <option value="DevOps">DevOps</option>
                                    <option value="Mobile">Mobile</option>
                                    <option value="Seguridad">Seguridad</option>
                                    <option value="Otro">Otro</option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('categoria')}"
                                     th:errors="*{categoria}"></div>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-person-video3 me-1"></i>Docente <span class="text-danger">*</span>
                                </label>
                                <input type="text" th:field="*{docente}"
                                       th:class="${#fields.hasErrors('docente')} ? 'form-control is-invalid' : 'form-control'"
                                       placeholder="Ej: Prof. Carlos Mendez">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('docente')}"
                                     th:errors="*{docente}"></div>
                            </div>

                        </div>

                        <hr class="my-4">

                        <div class="d-flex gap-2 justify-content-end">
                            <a th:href="@{/cursos}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left me-1"></i>Cancelar
                            </a>
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-floppy me-1"></i>
                                <span th:text="${accion}">Guardar</span>
                            </button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
