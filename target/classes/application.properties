# ==========================================
# SpringEduManager - application.properties
# M6: Spring Framework
# ==========================================

spring.application.name=SpringEduManager
server.port=8080

# ------------------------------------------
# LECCION 3: Base de datos H2 (embebida)
# ------------------------------------------
spring.datasource.url=jdbc:h2:mem:springedumanager;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Consola H2 (acceder en: http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.trace=false
spring.h2.console.settings.web-allow-others=false

# ------------------------------------------
# LECCION 3: JPA / Hibernate
# ------------------------------------------
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# create-drop: crea el schema al inicio y lo elimina al cerrar (desarrollo)
# update: conserva los datos entre reinicios
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Necesario para que data.sql se ejecute DESPUES de que Hibernate cree las tablas
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ------------------------------------------
# MYSQL (Leccion 3 - alternativa a H2)
# Para activar: comentar todo lo de H2 de arriba
# y descomentar las siguientes lineas
# ------------------------------------------
# spring.datasource.url=jdbc:mysql://localhost:3306/springedumanager?useSSL=false&serverTimezone=UTC
