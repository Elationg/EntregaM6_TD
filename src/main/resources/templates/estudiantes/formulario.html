<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SpringEduManager - Formulario Estudiante</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}" th:with="currentPage='estudiantes'"></div>
<div th:replace="~{fragments/navbar :: alertas}"></div>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-7">

            <!-- Breadcrumb -->
            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}">Inicio</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/estudiantes}">Estudiantes</a></li>
                    <li class="breadcrumb-item active" th:text="${accion} + ' Estudiante'"></li>
                </ol>
            </nav>

            <!-- Card formulario -->
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">
                        <i class="bi bi-person-plus me-2"></i>
                        <span th:text="${accion} + ' Estudiante'"></span>
                    </h5>
                </div>

                <div class="card-body p-4">
                    <!-- Formulario Leccion 2: @PostMapping /estudiantes/guardar -->
                    <form th:action="@{/estudiantes/guardar}" th:object="${estudiante}" method="post"
                          novalidate>

                        <!-- ID oculto para edicion -->
                        <input type="hidden" th:field="*{id}">

                        <div class="row g-3">

                            <div class="col-md-6">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-person me-1"></i>Nombre <span class="text-danger">*</span>
                                </label>
                                <input type="text" th:field="*{nombre}"
                                       th:class="${#fields.hasErrors('nombre')} ? 'form-control is-invalid' : 'form-control'"
                                       placeholder="Ej: Juan">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}"
                                     th:errors="*{nombre}"></div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-person me-1"></i>Apellido <span class="text-danger">*</span>
                                </label>
                                <input type="text" th:field="*{apellido}"
                                       th:class="${#fields.hasErrors('apellido')} ? 'form-control is-invalid' : 'form-control'"
                                       placeholder="Ej: Perez">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('apellido')}"
                                     th:errors="*{apellido}"></div>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-envelope me-1"></i>Email <span class="text-danger">*</span>
                                </label>
                                <input type="email" th:field="*{email}"
                                       th:class="${#fields.hasErrors('email')} ? 'form-control is-invalid' : 'form-control'"
                                       placeholder="Ej: juan.perez@email.com">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
                                     th:errors="*{email}"></div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-credit-card me-1"></i>DNI <span class="text-danger">*</span>
                                </label>
                                <input type="text" th:field="*{dni}"
                                       th:class="${#fields.hasErrors('dni')} ? 'form-control is-invalid' : 'form-control'"
                                       placeholder="Ej: 12345678"
                                       maxlength="10">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('dni')}"
                                     th:errors="*{dni}"></div>
                                <div class="form-text">Solo numeros, entre 7 y 10 digitos</div>
                            </div>

                        </div>

                        <hr class="my-4">

                        <div class="d-flex gap-2 justify-content-end">
                            <a th:href="@{/estudiantes}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left me-1"></i>Cancelar
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-floppy me-1"></i>
                                <span th:text="${accion}">Guardar</span>
                            </button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
