<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SpringEduManager - Estudiantes</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}" th:with="currentPage='estudiantes'"></div>
<div th:replace="~{fragments/navbar :: alertas}"></div>

<div class="container py-4">

    <!-- Cabecera -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-0">
                <i class="bi bi-people-fill text-primary me-2"></i>Estudiantes
            </h2>
            <small class="text-muted">Gestion de estudiantes registrados en la plataforma</small>
        </div>
        <a th:href="@{/estudiantes/nuevo}" class="btn btn-primary"
           sec:authorize="hasRole('ADMIN')">
            <i class="bi bi-person-plus me-1"></i>Nuevo Estudiante
        </a>
    </div>

    <!-- Buscador -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <form th:action="@{/estudiantes}" method="get" class="row g-2">
                <div class="col-md-10">
                    <input type="text" name="buscar" class="form-control"
                           placeholder="Buscar por nombre, apellido o email..."
                           th:value="${buscar}">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-outline-primary w-100">
                        <i class="bi bi-search me-1"></i>Buscar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Tabla de estudiantes -->
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white border-0">
            <span class="text-muted small">
                <i class="bi bi-list me-1"></i>
                <span th:text="${#lists.size(estudiantes)}"></span> estudiante(s) encontrado(s)
            </span>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-primary">
                        <tr>
                            <th>#</th>
                            <th>Nombre completo</th>
                            <th>Email</th>
                            <th>DNI</th>
                            <th class="text-center" sec:authorize="hasRole('ADMIN')">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="estudiante, stat : ${estudiantes}">
                            <td class="text-muted" th:text="${stat.count}"></td>
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <div class="bg-primary bg-opacity-10 rounded-circle p-2">
                                        <i class="bi bi-person-fill text-primary"></i>
                                    </div>
                                    <div>
                                        <div class="fw-semibold" th:text="${estudiante.nombreCompleto}"></div>
                                    </div>
                                </div>
                            </td>
                            <td>
                                <a th:href="'mailto:' + ${estudiante.email}"
                                   class="text-decoration-none"
                                   th:text="${estudiante.email}"></a>
                            </td>
                            <td>
                                <code th:text="${estudiante.dni}"></code>
                            </td>
                            <td class="text-center" sec:authorize="hasRole('ADMIN')">
                                <a th:href="@{/estudiantes/editar/{id}(id=${estudiante.id})}"
                                   class="btn btn-sm btn-outline-warning me-1"
                                   title="Editar">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/estudiantes/eliminar/{id}(id=${estudiante.id})}"
                                   class="btn btn-sm btn-outline-danger"
                                   title="Eliminar"
                                   onclick="return confirm('¿Confirma eliminar este estudiante?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(estudiantes)}">
                            <td colspan="5" class="text-center text-muted py-5">
                                <i class="bi bi-people display-6 d-block mb-2"></i>
                                No se encontraron estudiantes
                                <span th:if="${buscar != null}"> para "<strong th:text="${buscar}"></strong>"</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
