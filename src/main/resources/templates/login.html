<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SpringEduManager - Iniciar Sesion</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd 0%, #0dcaf0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 1rem 3rem rgba(0,0,0,0.2);
        }
        .login-header {
            background: linear-gradient(135deg, #0d6efd 0%, #0dcaf0 100%);
            border-radius: 1rem 1rem 0 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card login-card">

                <!-- Header -->
                <div class="login-header text-white text-center p-4">
                    <i class="bi bi-mortarboard-fill display-4 mb-2"></i>
                    <h4 class="fw-bold mb-0">SpringEduManager</h4>
                    <small>Plataforma educativa</small>
                </div>

                <!-- Body -->
                <div class="card-body p-4">
                    <h5 class="text-center text-muted mb-4">Iniciar Sesion</h5>

                    <!-- Error de login -->
                    <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center gap-2" role="alert">
                        <i class="bi bi-exclamation-triangle-fill"></i>
                        <span>Usuario o contrasena incorrectos. Intente nuevamente.</span>
                    </div>

                    <!-- Logout exitoso -->
                    <div th:if="${param.logout}" class="alert alert-info d-flex align-items-center gap-2" role="alert">
                        <i class="bi bi-check-circle-fill"></i>
                        <span>Sesion cerrada correctamente.</span>
                    </div>

                    <!-- Formulario de Login - Leccion 4 -->
                    <form th:action="@{/login}" method="post">

                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">
                                <i class="bi bi-person me-1"></i>Usuario
                            </label>
                            <input type="text" id="username" name="username"
                                   class="form-control form-control-lg"
                                   placeholder="Ingrese su usuario"
                                   autocomplete="username"
                                   required autofocus>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">
                                <i class="bi bi-lock me-1"></i>Contrasena
                            </label>
                            <input type="password" id="password" name="password"
                                   class="form-control form-control-lg"
                                   placeholder="Ingrese su contrasena"
                                   autocomplete="current-password"
                                   required>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Footer con usuarios de prueba -->
                <div class="card-footer bg-light rounded-bottom p-3">
                    <p class="text-muted text-center small mb-2 fw-semibold">Usuarios de prueba:</p>
                    <div class="row text-center small">
                        <div class="col-4">
                            <div class="badge bg-danger mb-1 d-block">ADMIN</div>
                            <code class="d-block">admin</code>
                            <code class="d-block">admin123</code>
                        </div>
                        <div class="col-4">
                            <div class="badge bg-primary mb-1 d-block">USER</div>
                            <code class="d-block">user</code>
                            <code class="d-block">user123</code>
                        </div>
                        <div class="col-4">
                            <div class="badge bg-secondary mb-1 d-block">USER</div>
                            <code class="d-block">estudiante</code>
                            <code class="d-block">est123</code>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
