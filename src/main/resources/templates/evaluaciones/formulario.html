<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SpringEduManager - Formulario Evaluacion</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}" th:with="currentPage='evaluaciones'"></div>
<div th:replace="~{fragments/navbar :: alertas}"></div>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-7">

            <!-- Breadcrumb -->
            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}">Inicio</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/evaluaciones}">Evaluaciones</a></li>
                    <li class="breadcrumb-item active" th:text="${accion} + ' Evaluacion'"></li>
                </ol>
            </nav>

            <div class="card border-0 shadow-sm">
                <div class="card-header bg-warning text-dark">
                    <h5 class="mb-0">
                        <i class="bi bi-pencil-square me-2"></i>
                        <span th:text="${accion} + ' Evaluacion'"></span>
                    </h5>
                </div>

                <div class="card-body p-4">
                    <form th:action="@{/evaluaciones/guardar}" th:object="${evaluacion}"
                          method="post" novalidate>

                        <input type="hidden" th:field="*{id}">

                        <div class="row g-3">

                            <div class="col-12">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-clipboard me-1"></i>Titulo <span class="text-danger">*</span>
                                </label>
                                <input type="text" th:field="*{titulo}"
                                       th:class="${#fields.hasErrors('titulo')} ? 'form-control is-invalid' : 'form-control'"
                                       placeholder="Ej: Parcial 1 - Spring MVC">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('titulo')}"
                                     th:errors="*{titulo}"></div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-people me-1"></i>Estudiante <span class="text-danger">*</span>
                                </label>
                                <select th:field="*{estudiante.id}"
                                        th:class="${#fields.hasErrors('estudiante')} ? 'form-select is-invalid' : 'form-select'">
                                    <option value="">-- Seleccione estudiante --</option>
                                    <option th:each="e : ${estudiantes}"
                                            th:value="${e.id}"
                                            th:text="${e.nombreCompleto}">
                                    </option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('estudiante')}"
                                     th:errors="*{estudiante}"></div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-book me-1"></i>Curso <span class="text-danger">*</span>
                                </label>
                                <select th:field="*{curso.id}"
                                        th:class="${#fields.hasErrors('curso')} ? 'form-select is-invalid' : 'form-select'">
                                    <option value="">-- Seleccione curso --</option>
                                    <option th:each="c : ${cursos}"
                                            th:value="${c.id}"
                                            th:text="${c.nombre}">
                                    </option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('curso')}"
                                     th:errors="*{curso}"></div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-star me-1"></i>Nota (0 - 10) <span class="text-danger">*</span>
                                </label>
                                <input type="number" step="0.1" min="0" max="10"
                                       th:field="*{nota}"
                                       th:class="${#fields.hasErrors('nota')} ? 'form-control is-invalid' : 'form-control'"
                                       placeholder="Ej: 8.5">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('nota')}"
                                     th:errors="*{nota}"></div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-calendar me-1"></i>Fecha <span class="text-danger">*</span>
                                </label>
                                <input type="date" th:field="*{fecha}"
                                       th:class="${#fields.hasErrors('fecha')} ? 'form-control is-invalid' : 'form-control'">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('fecha')}"
                                     th:errors="*{fecha}"></div>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-chat-text me-1"></i>Observaciones
                                </label>
                                <textarea th:field="*{observaciones}" rows="2"
                                          class="form-control"
                                          placeholder="Comentarios adicionales (opcional)..."></textarea>
                            </div>

                        </div>

                        <hr class="my-4">

                        <div class="d-flex gap-2 justify-content-end">
                            <a th:href="@{/evaluaciones}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left me-1"></i>Cancelar
                            </a>
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-floppy me-1"></i>
                                <span th:text="${accion}">Guardar</span>
                            </button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
