<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SpringEduManager - Evaluaciones</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}" th:with="currentPage='evaluaciones'"></div>
<div th:replace="~{fragments/navbar :: alertas}"></div>

<div class="container py-4">

    <!-- Cabecera -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-0">
                <i class="bi bi-clipboard-check-fill text-warning me-2"></i>Evaluaciones
            </h2>
            <small class="text-muted">Registro de calificaciones por estudiante y curso</small>
        </div>
        <a th:href="@{/evaluaciones/nuevo}" class="btn btn-warning"
           sec:authorize="hasRole('ADMIN')">
            <i class="bi bi-pencil-square me-1"></i>Nueva Evaluacion
        </a>
    </div>

    <!-- Tabla de evaluaciones -->
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white border-0">
            <span class="text-muted small">
                <i class="bi bi-list me-1"></i>
                <span th:text="${#lists.size(evaluaciones)}"></span> evaluacion(es) registrada(s)
            </span>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-warning">
                        <tr>
                            <th>#</th>
                            <th>Titulo</th>
                            <th>Estudiante</th>
                            <th>Curso</th>
                            <th class="text-center">Nota</th>
                            <th>Estado</th>
                            <th>Fecha</th>
                            <th class="text-center" sec:authorize="hasRole('ADMIN')">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="ev, stat : ${evaluaciones}">
                            <td class="text-muted" th:text="${stat.count}"></td>
                            <td class="fw-semibold" th:text="${ev.titulo}"></td>
                            <td>
                                <span th:text="${ev.estudiante.nombreCompleto}"></span>
                            </td>
                            <td>
                                <span class="badge bg-success bg-opacity-10 text-success"
                                      th:text="${ev.curso.nombre}"></span>
                            </td>
                            <td class="text-center">
                                <span class="fw-bold fs-5"
                                      th:text="${#numbers.formatDecimal(ev.nota, 1, 1)}"
                                      th:class="${ev.nota >= 7} ? 'text-success fw-bold fs-5' :
                                                 (${ev.nota >= 4} ? 'text-warning fw-bold fs-5' : 'text-danger fw-bold fs-5')">
                                </span>
                            </td>
                            <td>
                                <span th:text="${ev.estadoNota}"
                                      th:class="${ev.nota >= 7} ? 'badge bg-success' :
                                                 (${ev.nota >= 4} ? 'badge bg-warning text-dark' : 'badge bg-danger')">
                                </span>
                            </td>
                            <td>
                                <small class="text-muted"
                                       th:text="${#temporals.format(ev.fecha, 'dd/MM/yyyy')}"></small>
                            </td>
                            <td class="text-center" sec:authorize="hasRole('ADMIN')">
                                <a th:href="@{/evaluaciones/editar/{id}(id=${ev.id})}"
                                   class="btn btn-sm btn-outline-warning me-1" title="Editar">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/evaluaciones/eliminar/{id}(id=${ev.id})}"
                                   class="btn btn-sm btn-outline-danger" title="Eliminar"
                                   onclick="return confirm('¿Confirma eliminar esta evaluacion?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(evaluaciones)}">
                            <td colspan="8" class="text-center text-muted py-5">
                                <i class="bi bi-clipboard display-6 d-block mb-2"></i>
                                No hay evaluaciones registradas aun
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
